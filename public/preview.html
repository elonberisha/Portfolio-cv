   Tpl01Terminal, Tpl02Editorial, Tpl03Brutalist, Tpl04Y2K, Tpl05Swiss,
   Tpl06Playful, Tpl073D, Tpl08Notebook, Tpl09Newspaper, Tpl10Corporate,

   Tpl16Receipt, Tpl17Library, Tpl18Poster, Tpl19Finder, Tpl20Botanical,
   Tpl21Resume, Tpl22Bento, Tpl23Notion, Tpl24Spare, Tpl25Blog,
   Tpl26Blueprint, Tpl27Circuit, Tpl28SpecSheet, Tpl29Quarterly, Tpl30Bloomberg, Tpl31Ledger,

   Tpl50SilkIron, Tpl51Redacted, Tpl52LexFutura,
   Tpl53VitalsMonitor, Tpl54Lancet, Tpl55PathologyLab, Tpl56SurgicalBrief, Tpl57NhsClinical */

/* Resolve via window.* so a single missing global yields `undefined`
   (graceful "not found") instead of a ReferenceError that blanks every
   preview. */
const W = window;
const TEMPLATE_MAP = {
  'terminal':       W.Tpl01Terminal,
  'editorial':      W.Tpl02Editorial,
  'brutalist':      W.Tpl03Brutalist,
  'y2k':            W.Tpl04Y2K,
  'swiss':          W.Tpl05Swiss,
  'playful':        W.Tpl06Playful,
  '3d':             W.Tpl073D,
  'notebook':       W.Tpl08Notebook,
  'newspaper':      W.Tpl09Newspaper,
  'corporate':      W.Tpl10Corporate,
  'boarding':       W.Tpl11BoardingPass,
  'museum':         W.Tpl12Museum,
  'tcg':            W.Tpl13TradingCard,
  'manifesto':      W.Tpl14Manifesto,
  'atlas':          W.Tpl15Atlas,
  'receipt':        W.Tpl16Receipt,
  'library':        W.Tpl17Library,
  'poster':         W.Tpl18Poster,
  'finder':         W.Tpl19Finder,
  'botanical':      W.Tpl20Botanical,
  'resume':         W.Tpl21Resume,
  'bento':          W.Tpl22Bento,
  'notion':         W.Tpl23Notion,
  'spare':          W.Tpl24Spare,
  'blog':           W.Tpl25Blog,
  'blueprint':      W.Tpl26Blueprint,
  'circuit':        W.Tpl27Circuit,
  'specsheet':      W.Tpl28SpecSheet,
  'quarterly':      W.Tpl29Quarterly,
  'bloomberg':      W.Tpl30Bloomberg,
  'ledger':         W.Tpl31Ledger,
  'legalbrief':     W.Tpl32LegalBrief,
  'gazette':        W.Tpl33Gazette,
  'transcript':     W.Tpl34Transcript,
  'chart':          W.Tpl35PatientChart,
  'anatomy':        W.Tpl36Anatomy,
  'rx':             W.Tpl37Rx,
  'magazine':       W.Tpl38Magazine,
  'risozine':       W.Tpl39RisoZine,
  'photofolio':     W.Tpl40PhotoFolio,
  'paper':          W.Tpl41ResearchPaper,
  'fieldnotes':     W.Tpl42FieldNotebook,
  'syllabus':       W.Tpl43Syllabus,
  'scoreboard':     W.Tpl44Scoreboard,
  'athletecard':    W.Tpl45AthleteCard,
  'traininglog':    W.Tpl46TrainingLog,
  'fieldjournal':   W.Tpl47FieldJournal,
  'almanac':        W.Tpl48Almanac,
  'soilmap':        W.Tpl49SoilMap,
  'silkiron':       W.Tpl50SilkIron,
  'redacted':       W.Tpl51Redacted,
  'lexfutura':      W.Tpl52LexFutura,
  'vitalsmonitor':  W.Tpl53VitalsMonitor,
  'thelancet':      W.Tpl54Lancet,
  'pathologylab':   W.Tpl55PathologyLab,
  'surgicalbrief':  W.Tpl56SurgicalBrief,
  'nhsclinical':    W.Tpl57NhsClinical,
};

const params = new URLSearchParams(window.location.search);
const templateId = params.get('id') || 'terminal';
const mobile = params.get('mobile') === '1';
const dark = params.get('dark') === '1';

const Comp = TEMPLATE_MAP[templateId];

function App() {
  if (!Comp) {
    return (
      <div style={{ padding: 40, fontFamily: 'monospace', color: '#888' }}>
        Template "{templateId}" not found.
      </div>
    );
  }
  return <Comp mode={mobile ? 'mobile' : 'desktop'} dark={dark} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
/* When preview.html is embedded inside the studio iframe, load the editor
   runtime after the React tree has rendered (one rAF is enough). */
if (window !== window.parent) {
  requestAnimationFrame(function() {
    var s = document.createElement('script');
    s.src = '/editor-runtime.js';
    document.body.appendChild(s);
  });
}
</script>
